name: Release Android APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare artifact
        run: cp build/app/outputs/flutter-apk/app-release.apk ledger-app.apk

      - name: Generate release notes
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          RELEASE_DATE="$(date -u +'%Y-%m-%d %H:%M UTC')"
          sed \
            -e "s/__TAG__/${TAG_NAME}/g" \
            -e "s/__RELEASE_DATE__/${RELEASE_DATE//\//\\/}/g" \
            .github/release-notes-template.md > release-notes.md

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: ledger-app.apk
          body_path: release-notes.md
